<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coder Profile | Contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="container nav-container">
            <div class="logo">
                <span class="bracket">&lt;</span>
                CONTACT ME
            </div>
            <nav>
                <ul>
                    <li><a href="./">Home</a></li>
                    <li><a href="./project">Projects</a></li>
                    <li><a href="./skills">Skills</a></li>
                    <li><a href="./contact" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container contact-section">
        <div class="contact-wrapper">
            <div class="contact-info">
                <h1 class="section-title">Get In <span class="bracket">Touch</span></h1>
                <p class="section-subtitle">Have a project in mind, a question about hardware, or just want to say hi? Send me a message.</p>
                
                <div class="terminal-box">
                    <p><span class="keyword">ping</span> -c 1 bajrang.xyz</p>
                    <p class="success">64 bytes from bajrang.xyz: icmp_seq=1 ttl=54 time=14.2 ms</p>
                </div>
            </div>

            <div class="contact-form-container">
                <form id="ajax-contact-form" class="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="YOUR_NAME" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="hello@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone </label>
                        <input type="tel" id="phone" placeholder="+91 0000000000" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" rows="5" placeholder="print('Hello World!')" required></textarea>
                    </div>
                    <button type="submit" class="btn-primary">Send Message</button>
                </form>
            </div>
        </div>
    </main>

     <footer>
        <div class="container">
            <p>&copy; 2026 B<sup>2</sup>. All rights reserved. Status: <span class="status-ok">OK</span></p>
        </div>
    </footer>

<script src="script.js"></script>
</body>
</html>

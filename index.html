<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Application - Biology Boards</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #03030f;
            text-align: center;
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            background: white;
            padding: 30px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
        }

        .funny-photo {
            width: 100%;
            max-width: 250px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 50px;
        }

        button {
            font-size: 18px;
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Accept Button Style */
        .btn-accept {
            background-color: #4CAF50;
            color: white;
            transition: transform 0.2s;
        }

        .btn-accept:active {
            transform: scale(0.95);
        }

        /* Reject Button Style */
        .btn-reject {
            background-color: #f44336;
            color: white;
            position: absolute; /* Allows it to teleport */
            transition: top 0.2s ease, left 0.2s ease; 
        }

        /* Hidden form styling */
        form {
            display: inline-block;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://images.unsplash.com/photo-1543852786-1cf6624b9987?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60" alt="Funny pleading cat" class="funny-photo">
        
        <h1>Application to Barun Sir</h1>
        <p>Dear Barun Sir,<br><br>I won't be available to attend the class today as I have my Biology Boards. Please grant me leave for today. Wish me luck!</p>
        
        <div class="button-container" id="btnContainer">
            
            <form action="https://formspree.io/f/xdayalne" method="POST">
                <input type="hidden" name="Subject" value="Leave Application Accepted!">
                <input type="hidden" name="Message" value="Barun Sir has clicked ACCEPT on your leave application for the Biology Boards.">
                <button type="submit" class="btn-accept">Accept</button>
            </form>

            <button type="button" class="btn-reject" id="rejectBtn">Reject</button>
        </div>
    </div>

    <script>
        const rejectBtn = document.getElementById('rejectBtn');

        // Function to move the button to a random spot on the screen
        function moveButton() {
            // Get the viewport dimensions
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            // Get button dimensions so it doesn't go off-screen
            const btnWidth = rejectBtn.offsetWidth;
            const btnHeight = rejectBtn.offsetHeight;

            // Calculate random positions
            const randomX = Math.floor(Math.random() * (windowWidth - btnWidth));
            const randomY = Math.floor(Math.random() * (windowHeight - btnHeight));

            // Change button to fixed position so it breaks out of the container
            rejectBtn.style.position = 'fixed';
            rejectBtn.style.left = `${randomX}px`;
            rejectBtn.style.top = `${randomY}px`;
        }

        // Desktop: triggers when the mouse hovers over it
        rejectBtn.addEventListener('mouseover', moveButton);
        
        // Mobile: triggers when a finger touches it
        rejectBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevents the actual click
            moveButton();
        });

        // Just in case they somehow manage to click it
        rejectBtn.addEventListener('click', (e) => {
            e.preventDefault();
            moveButton();
        });
    </script>

</body>
</html>
